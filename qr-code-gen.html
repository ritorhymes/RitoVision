          <button id="generate-btn" class="button" disabled="">Generate QR Codes</button>

          <button id="reset-btn" class="button">Reset</button>

      <!--  External Scripts  -->
      <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.0/jszip.min.js"></script>
      <!--  Generator Script  -->
      <script>
        (function() {
            // Ensure the script runs within the qr-generator scope
            const container = document.getElementById('qr-generator');
            const excelFileInput = container.querySelector('#excel-file');
            const generateBtn = container.querySelector('#generate-btn');
            const downloadAllBtn = container.querySelector('#download-all-btn');
            const resetBtn = container.querySelector('#reset-btn');
            const progressContainer = container.querySelector('#progress-container');
            const progressBar = container.querySelector('#progress-bar');
            const qrContainer = container.querySelector('#qr-codes');
            const qrSizeSlider = container.querySelector('#qr-size');
            const sizeValueSpan = container.querySelector('#size-value');
            const logoFileInput = container.querySelector('#logo-file');
            const uriPrefixSelect = container.querySelector('#uri-prefix');
            const fgColorInput = container.querySelector('#foreground-color');
            const bgColorInput = container.querySelector('#background-color');
            const fgHexInput = container.querySelector('#fg-hex');
            const bgHexInput = container.querySelector('#bg-hex');
            const excelErrorMsg = container.querySelector('#excel-file-error');
            const excelFileList = container.querySelector('#excel-file-list');
            const logoErrorMsg = container.querySelector('#logo-file-error');
            const logoFileList = container.querySelector('#logo-file-list');
            const excelLabel = container.querySelector('#excel-file-label');
            const logoLabel = container.querySelector('#logo-file-label');
            const excelUploadField = container.querySelector('#excel-upload-field');
            const logoUploadField = container.querySelector('#logo-upload-field');
            // Update the displayed size value as the slider moves
            qrSizeSlider.addEventListener('input', function() {
                sizeValueSpan.textContent = this.value;
                checkAndEnableGenerate();
            });
            // Function to enable the Generate button if Excel file is present and all validations pass
            function checkAndEnableGenerate() {
                const isExcelValid = validateExcelFile();
                const isLogoValid = validateLogoFile();
                if (isExcelValid && isLogoValid) {
                    generateBtn.disabled = false;
                } else {
                    generateBtn.disabled = true;
                }
            }
            // Validate Excel file
            function validateExcelFile() {
                if (excelFileInput.files && excelFileInput.files.length > 0) {
                    const file = excelFileInput.files[0];
                    const validExtensions = ['application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', 'application/vnd.ms-excel'];
                    if (!validExtensions.includes(file.type)) {
                        // Show error message
                        excelErrorMsg.style.display = 'block';
                        excelErrorMsg.textContent = 'Please upload only Excel files.';
                        excelFileList.innerHTML = '';
                        return false;
                    } else {
                        // Hide error message
                        excelErrorMsg.style.display = 'none';
                        // Display file name
                        excelFileList.innerHTML = `<p>${file.name}</p>`;
                        return true;
                    }
                } else {
                    excelErrorMsg.style.display = 'none';
                    excelFileList.innerHTML = '';
                    return false;
                }
            }
            // Validate Logo/Image file
            function validateLogoFile() {
                if (logoFileInput.files && logoFileInput.files.length > 0) {
                    const file = logoFileInput.files[0];
                    const validImageTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/bmp', 'image/webp'];
                    if (!validImageTypes.includes(file.type)) {
                        // Show error message
                        logoErrorMsg.style.display = 'block';
                        logoErrorMsg.textContent = 'Image files only please.';
                        logoFileList.innerHTML = '';
                        return false;
                    } else {
                        // Hide error message
                        logoErrorMsg.style.display = 'none';
                        // Display file name
                        logoFileList.innerHTML = `<p>${file.name}</p>`;
                        return true;
                    }
                } else {
                    logoErrorMsg.style.display = 'none';
                    logoFileList.innerHTML = '';
                    return true; // Since it's optional
                }
            }
            // Add event listeners to all inputs to enable the Generate button when changes occur
            const inputsToWatch = [
                logoFileInput,
                uriPrefixSelect,
                fgColorInput,
                bgColorInput,
                fgHexInput,
                bgHexInput
            ];
            inputsToWatch.forEach(input => {
                input.addEventListener('input', checkAndEnableGenerate);
                input.addEventListener('change', checkAndEnableGenerate);
            });
            // Additionally, listen to the Excel file input to handle re-uploading the same file
            excelFileInput.addEventListener('change', function() {
                validateExcelFile();
                checkAndEnableGenerate();
            });
            // Listen to logo file input changes
            logoFileInput.addEventListener('change', function() {
                validateLogoFile();
                checkAndEnableGenerate();
            });
            // Function to load the logo image
            function loadLogo(file) {
                return new Promise((resolve, reject) => {
                    if (!file) {
                        resolve(null);
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = new Image();
                        img.onload = function() {
                            resolve(img);
                        };
                        img.onerror = function() {
                            alert('Failed to load the logo image. Please ensure it is a valid image file.');
                            reject(null);
                        };
                        img.src = e.target.result;
                    };
                    reader.onerror = function() {
                        alert('Error reading the logo image file.');
                        reject(null);
                    };
                    reader.readAsDataURL(file);
                });
            }
            // Function to generate QR code with embedded logo
            function generateQRCodeWithLogo(qrData, options, logoImg) {
                return new Promise((resolve, reject) => {
                    // Create a temporary div to hold the QRCode
                    const tempDiv = document.createElement('div');
                    const qrCode = new QRCode(tempDiv, {
                        text: qrData,
                        width: options.size,
                        height: options.size,
                        colorDark: options.fgColor,
                        colorLight: options.bgColor,
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    // Wait a short time to ensure the QR code is generated
                    setTimeout(() => {
                        try {
                            const canvas = tempDiv.querySelector('canvas');
                            if (!canvas) {
                                reject('QR code canvas not found.');
                                return;
                            }
                            const ctx = canvas.getContext('2d');
                            if (logoImg) {
                                // Calculate logo size (e.g., 20% of QR code size)
                                const logoSize = options.size * 0.2;
                                const x = (canvas.width - logoSize) / 2;
                                const y = (canvas.height - logoSize) / 2;
                                ctx.drawImage(logoImg, x, y, logoSize, logoSize);
                            }
                            resolve(canvas.toDataURL('image/png'));
                        } catch (error) {
                            reject(error);
                        }
                    }, 500); // Adjust the timeout as needed
                });
            }
            // Function to reset all inputs and states
            function resetAll() {
                // Reset file inputs
                excelFileInput.value = '';
                logoFileInput.value = '';
                // Reset select dropdown
                uriPrefixSelect.selectedIndex = 0;
                // Reset slider and its display
                qrSizeSlider.value = 350;
                sizeValueSpan.textContent = '350';
                // Reset color pickers and hex inputs
                fgColorInput.value = '#000000';
                bgColorInput.value = '#ffffff';
                fgHexInput.value = '#000000';
                bgHexInput.value = '#ffffff';
                // Clear QR codes
                qrContainer.innerHTML = '';
                // Hide and reset progress bar
                progressContainer.style.display = 'none';
                progressBar.style.width = '0%';
                progressBar.textContent = 'Processing...';
                // Hide error messages
                excelErrorMsg.style.display = 'none';
                logoErrorMsg.style.display = 'none';
                // Clear file lists
                excelFileList.innerHTML = '';
                logoFileList.innerHTML = '';
                // Reset labels if they were changed during drag
                excelLabel.textContent = 'Upload Excel File:';
                logoLabel.textContent = 'Upload Logo/Image (Optional):';
                // Disable buttons
                generateBtn.disabled = true;
                downloadAllBtn.disabled = true;
            }
            // Event listener for the Reset button
            resetBtn.addEventListener('click', resetAll);
            // Function to handle drag over events
            function handleDragOver(event, uploadField, label) {
                event.preventDefault();
                event.stopPropagation();
                uploadField.classList.add('drag-over');
                label.textContent = 'Drag here to upload';
            }
            // Function to handle drag leave events
            function handleDragLeave(event, uploadField, label, originalText) {
                event.preventDefault();
                event.stopPropagation();
                uploadField.classList.remove('drag-over');
                label.textContent = originalText;
            }
            // Function to handle drop events
            function handleDrop(event, fileInput, uploadField, label, originalText, isExcel) {
                event.preventDefault();
                event.stopPropagation();
                uploadField.classList.remove('drag-over');
                label.textContent = originalText;
                const files = event.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    if (isExcel) {
                        // Validate Excel file
                        const validExtensions = ['application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', 'application/vnd.ms-excel'];
                        if (!validExtensions.includes(file.type)) {
                            // Show error message
                            excelErrorMsg.style.display = 'block';
                            excelErrorMsg.textContent = 'Please upload only Excel files.';
                            excelFileList.innerHTML = '';
                            fileInput.value = ''; // Reset the file input
                            checkAndEnableGenerate();
                            return;
                        } else {
                            // Hide error message
                            excelErrorMsg.style.display = 'none';
                        }
                    } else {
                        // Validate Logo/Image file
                        const validImageTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/bmp', 'image/webp'];
                        if (!validImageTypes.includes(file.type)) {
                            // Show error message
                            logoErrorMsg.style.display = 'block';
                            logoErrorMsg.textContent = 'Image files only please.';
                            logoFileList.innerHTML = '';
                            fileInput.value = ''; // Reset the file input
                            checkAndEnableGenerate();
                            return;
                        } else {
                            // Hide error message
                            logoErrorMsg.style.display = 'none';
                        }
                    }
                    // Set the file to the input
                    fileInput.files = files;
                    // Trigger change event to enable Generate button and perform validation
                    const eventChange = new Event('change');
                    fileInput.dispatchEvent(eventChange);
                }
            }
            // Attach drag and drop event listeners to Excel upload field
            excelUploadField.addEventListener('dragover', function(event) {
                handleDragOver(event, excelUploadField, excelLabel);
            });
            excelUploadField.addEventListener('dragleave', function(event) {
                handleDragLeave(event, excelUploadField, excelLabel, 'Upload Excel File:');
            });
            excelUploadField.addEventListener('drop', function(event) {
                handleDrop(event, excelFileInput, excelUploadField, excelLabel, 'Upload Excel File:', true);
            });
            // Attach drag and drop event listeners to Logo upload field
            logoUploadField.addEventListener('dragover', function(event) {
                handleDragOver(event, logoUploadField, logoLabel);
            });
            logoUploadField.addEventListener('dragleave', function(event) {
                handleDragLeave(event, logoUploadField, logoLabel, 'Upload Logo/Image (Optional):');
            });
            logoUploadField.addEventListener('drop', function(event) {
                handleDrop(event, logoFileInput, logoUploadField, logoLabel, 'Upload Logo/Image (Optional):', false);
            });
            // Function to handle hex input changes for Foreground Color
            fgHexInput.addEventListener('input', function() {
                const hex = fgHexInput.value;
                if (isValidHex(hex)) {
                    fgColorInput.value = hex;
                }
            });
            // Function to handle hex input changes for Background Color
            bgHexInput.addEventListener('input', function() {
                const hex = bgHexInput.value;
                if (isValidHex(hex)) {
                    bgColorInput.value = hex;
                }
            });
            // Function to validate hex code
            function isValidHex(hex) {
                return /^#([0-9A-F]{3}){1,2}$/i.test(hex);
            }
            // Event listener for the Generate button
            generateBtn.addEventListener('click', async function() {
                const fileInput = excelFileInput;
                if (!fileInput.files || !fileInput.files[0]) {
                    alert('Please upload an Excel file.');
                    return;
                }
                // Show and reset the progress bar
                progressContainer.style.display = 'block';
                progressBar.style.width = '0%';
                progressBar.textContent = 'Processing...';
                // Disable buttons during processing
                generateBtn.disabled = true;
                downloadAllBtn.disabled = true;
                resetBtn.disabled = true;
                const logoInput = logoFileInput;
                let logoImg = null;
                if (logoInput.files && logoInput.files.length > 0) {
                    try {
                        logoImg = await loadLogo(logoInput.files[0]);
                    } catch (error) {
                        console.error('Logo loading failed:', error);
                        resetBtn.disabled = false;
                        return;
                    }
                }
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                        if (json.length === 0) {
                            alert('The Excel file is empty.');
                            progressBar.style.width = '100%';
                            progressBar.textContent = 'Complete';
                            resetBtn.disabled = false;
                            return;
                        }
                        const uriPrefix = uriPrefixSelect.value;
                        const qrSize = parseInt(qrSizeSlider.value);
                        const fgColor = fgColorInput.value;
                        const bgColor = bgColorInput.value;
                        // Clear previous QR codes
                        qrContainer.innerHTML = '';
                        // Update progress
                        progressBar.style.width = '50%';
                        progressBar.textContent = 'Generating QR Code...';
                        // Process only the first row
                        const firstRow = json[0];
                        if (firstRow && firstRow[0]) { // Check if first column has data
                            const qrData = uriPrefix + firstRow[0];
                            // Generate QR code with embedded logo
                            const qrOptions = {
                                size: qrSize,
                                fgColor: fgColor,
                                bgColor: bgColor
                            };
                            const qrImageURL = await generateQRCodeWithLogo(qrData, qrOptions, logoImg);
                            // Create QR code display element
                            const qrDiv = document.createElement('div');
                            qrDiv.className = 'qr-code';
                            const qrImage = document.createElement('img');
                            qrImage.src = qrImageURL;
                            qrImage.alt = `QR Code for ${firstRow[0]}`;
                            qrImage.width = qrSize;
                            qrImage.height = qrSize;
                            const label = document.createElement('div');
                            label.textContent = firstRow[0];
                            qrDiv.appendChild(qrImage);
                            qrDiv.appendChild(label);
                            // Removed the individual download button
                            qrContainer.appendChild(qrDiv);
                            // Update progress
                            progressBar.style.width = '100%';
                            progressBar.textContent = 'Complete';
                            // Enable Download All button
                            downloadAllBtn.disabled = false;
                        } else {
                            alert('No data found in the first column of the Excel file.');
                            progressBar.style.width = '100%';
                            progressBar.textContent = 'Complete';
                        }
                    } catch (error) {
                        console.error('Error generating QR codes:', error);
                        alert('An error occurred while generating QR codes. Please check the console for details.');
                        progressBar.style.width = '100%';
                        progressBar.textContent = 'Complete';
                    } finally {
                        // Hide progress bar after a short delay
                        setTimeout(() => {
                            progressContainer.style.display = 'none';
                        }, 1000);
                        // Re-enable buttons
                        resetBtn.disabled = false;
                    }
                };
                // Read the Excel file
                reader.readAsArrayBuffer(fileInput.files[0]);
            });
            // Event listener for the Download All QRs button
            downloadAllBtn.addEventListener('click', async function() {
                const qrImages = container.querySelectorAll('#qr-codes img');
                if (qrImages.length === 0) {
                    alert('No QR codes available to download.');
                    return;
                }
                // Show and reset the progress bar
                progressContainer.style.display = 'block';
                progressBar.style.width = '0%';
                progressBar.textContent = 'Creating ZIP...';
                // Disable buttons during processing
                downloadAllBtn.disabled = true;
                generateBtn.disabled = true;
                resetBtn.disabled = true;
                const zip = new JSZip();
                const imgFolder = zip.folder('qr_codes');
                qrImages.forEach((img, index) => {
                    const imgData = img.src.split(',')[1]; // Get base64 part
                    // Replace non-alphanumeric characters with underscores for file names
                    const fileName = img.alt.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.png';
                    imgFolder.file(fileName, imgData, {base64: true});
                });
                try {
                    // Update progress
                    progressBar.style.width = '50%';
                    progressBar.textContent = 'Generating ZIP...';
                    // Generate the zip file
                    const content = await zip.generateAsync({type:"blob"}, (metadata) => {
                        // Optional: Update progress based on metadata.percent
                        progressBar.style.width = `${metadata.percent}%`;
                    });
                    // Trigger download
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(content);
                    a.download = 'qr_codes.zip';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    // Update progress
                    progressBar.style.width = '100%';
                    progressBar.textContent = 'Complete';
                } catch (error) {
                    console.error('Error creating ZIP file:', error);
                    alert('An error occurred while creating the ZIP file. Please check the console for details.');
                    progressBar.style.width = '100%';
                    progressBar.textContent = 'Complete';
                } finally {
                    // Hide progress bar after a short delay
                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                    }, 1000);
                    // Re-enable buttons if QR codes are present
                    const qrImagesAfter = container.querySelectorAll('#qr-codes img');
                    if (qrImagesAfter.length > 0) {
                        downloadAllBtn.disabled = false;
                    } else {
                        downloadAllBtn.disabled = true;
                    }
                    generateBtn.disabled = !validateExcelFile() || !validateLogoFile();
                    resetBtn.disabled = false;
                }
            });
            // Initialize the state on page load
            resetAll();
        })();
    </script>
